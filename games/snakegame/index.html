<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=play_arrow" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" />
    <title>Snake Game</title>
</head>
<div class="LTD">
    <h1>
        LTD
    </h1>
</div>


<body class="notranslate">

    <div class="neon-background">
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>
     <div class="dot"></div>

    </div>

    <div class="Score">Score: <span class="Score-Value">00</span></div>

    <div class="Menu-Screen">
        <span class="Game-Over">Game-Over</span>
        <span class="Final-Score">Score <span>00</span></span>

        <button class="btn-play">
            <span class="material-symbols-outlined">
                play_arrow
            </span>
            Jogar Normal
        </button>

        <button class="btn-hard">
             <span class="material-symbols-outlined">
                play_arrow
            </span>
             Modo Difícil
        </button>
    </div>

    <canvas width="450" height="450"></canvas>

    <div class="mode-buttons">
         <button class="btn-mode btn-normal">
            Modo Normal
        </button>
         <button class="btn-mode btn-hard-fixed">
            Modo Difícil
        </button>
    </div>

   <body>
  <div class="eatsnake">
    <div class="texto">
      <div class="objeto">
        <img src="/sprites/food_0.png" alt="food 0">
        <p>= AZUL</p>
      </div>
      <div class="objeto">
        <img src="/sprites/food_1.png" alt="food 1">
        <p>= VERMELHO</p>
      </div>
      <div class="objeto">
        <img src="/sprites/food_2.png" alt="food 2">
        <p>= VERDE</p>
      </div>
      <div class="objeto">
        <img src="/sprites/food_3.png" alt="food 3">
        <p>= AMARELO</p>
      </div>
      <div class="objeto">
        <img src="/sprites/food_4.png" alt="food 4">
        <p>= MARROM</p>
      </div>
    </div>
  </div>
</body>
    <script src="./script.js"></script>
</body>
</html>
