<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LTD Mapas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <header class="cabecalho">
        <img class="img-logo" src="./image-site/logo_wyden_branco.png" alt="logo-wyden">
        <ul class="nav-conteiner">
            <a href="index.html">Início</a>
            <a href="map.html">Mapa</a>
            <a href="education.html">Educacional</a>
            <a href="games.html">Games</a>
            <a href="information.html">Informações</a>
            <a href="events.html">Eventos</a>
        </ul>
      </header>
      <main class="main-container">
        <div id="map"></div>
        <aside class="sidebar">
            <h3>Locais</h3>
            <button onclick="focusMap(-1.459935, -48.489726, 30)">Praça Batista Campos</button>
            <button onclick="focusMap(-1.45254, -48.494081, 17)">Praça da República</button>
            <button onclick="focusMap(-1.465089, -48.5054, 17)">Mangál das Garças</button>
        </aside>
      </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-1.4558, -48.4902], 20); // Mapa em Belém

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const marker = L.marker([-1.4558, -48.4902]).addTo(map);
        marker.bindPopup("<b>Olá!</b><br>Estou em Belém.").openPopup();

        function focusMap(lat, lng, zoom) {
            map.setView([lat, lng], zoom);
        }

        map.on('click', function(e) {
            alert("Você clicou no mapa em: " + e.latlng.toString());
        });
    </script>

    <script src="script.js"></script>
    
</body>
</html>
