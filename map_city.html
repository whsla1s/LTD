<body>

    <main>
        <h1>Mapa da Cidade</h1>

        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-1.4558, -48.4902], 13); // Mapa em Belém

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const marker = L.marker([-1.4558, -48.4902]).addTo(map);
        marker.bindPopup("<b>Olá!</b><br>Estou em Belém.").openPopup();

        map.on('click', function(e) {
            alert("Você clicou no mapa em: " + e.latlng.toString());
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
