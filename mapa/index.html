    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

        <div class="logos-prin">
            <img class="img-wyden" src="../image-site/logo_wyden_branco.png" alt="logo-wyden">
            <img class="img-ltd" src="../image-site/LTD Logo Versão 2.png" alt="logo-wyden">
        </div>   
        <ul class="nav-conteiner">
            <li><a href="../index/index.html">Início</a></li>
            <li><a href="../mapa/index.html" class="selecionado">Mapa</a></li>
            <li><a href="../educacional/index.html">Educacional</a></li>
            <li><a href="../games/index.html">Games</a></li>
            <li><a href="../informacao/index.html">Informações</a></li>
            <li><a href="../eventos/index.html">Eventos</a></li>
        </ul>
    </header>

    <main class="main-container">
        <div id="map"></div>
        <aside class="sidebar">
            <h3>Locais</h3>
            <button data-local="Praça Batista Campos" onclick="focusMap(-1.459935, -48.489726, 30)">Praça Batista Campos</button>
            <button data-local="Praça da Bandeira" onclick="focusMap(-1.454856, -48.499655, 30)">Praça da Bandeira</button>
            <button data-local="Praça da República" onclick="focusMap(-1.45254, -48.494081, 17)">Praça da República</button>
            <button data-local="Mangál das Garças" onclick="focusMap(-1.465089, -48.5054, 17)">Mangál das Garças</button>
            <button data-local="Complexo do Ver-O-Peso" onclick="focusMap(-1.447488, -48.499168, 16)">Complexo do Ver-O-Peso</button>
            <button data-local="Complexo Feliz Lusitânia" onclick="focusMap(-1.454580, -48.504934, 18)">Complexo Feliz Lusitânia</button>
            <button data-local="Orla Portal da Amazônia" onclick="focusMap(-1.469925, -48.50215, 16)">Orla Portal da Amazônia</button>
        </aside>
        
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-1.4558, -48.4902], 14); // Mapa em Belém
        
        L.tileLayer('https://tile.thunderforest.com/landscape/{z}/{x}/{y}.png?apikey=a314e26066124138b9e4c421c8c04e02', {
            attribution: '&copy; OpenCycleMap',
        }).addTo(map);

        // Locais(Nome, Coordenadas, Zoom)
        const locais = [
            { nome: "Praça Batista Campos", lat: -1.459935, lng: -48.489726, zoom: 30 },
            { nome: "Praça da Bandeira", lat: -1.454856, lng: -48.499655, zoom: 30 },
            { nome: "Praça da República", lat: -1.45254, lng: -48.494081, zoom: 17 },
            { nome: "Mangál das Garças", lat: -1.465089, lng: -48.5054, zoom: 17 },
            { nome: "Complexo do Ver-O-Peso", lat: -1.447488, lng: -48.499168, zoom: 16 },
            { nome: "Complexo Feliz Lusitânia", lat: -1.454580, lng: -48.504934, zoom: 18 },
            { nome: "Orla Portal da Amazônia", lat: -1.469925, lng: -48.50215, zoom: 16 }
        ];

        const marcadores = {};

        locais.forEach(local => {
            const marker = L.marker([local.lat, local.lng], {
                title: local.nome
            }).addTo(map);

            marker.bindTooltip(local.nome, { permanent: false, direction: 'top' });

            marker.on('click', () => {
                focusMap(local.lat, local.lng, local.zoom);
            });

            // Aguarda o DOM carregar o ícone do marcador
            marker.on('add', () => {
                const button = document.querySelector(`button[data-local="${local.nome}"]`);
                if (button) {
                    button.addEventListener('mouseenter', () => {
                        const icon = marker._icon;
                        if (icon) icon.classList.add('marcador-hover');
                    });

                    button.addEventListener('mouseleave', () => {
                        const icon = marker._icon;
                        if (icon) icon.classList.remove('marcador-hover');
                    });
                }
            });

            marcadores[local.nome] = marker;
        });

        function focusMap(lat, lng, zoom) {
            map.setView([lat, lng], zoom);
        }

        // Adiciona interação de hover nos botões
        document.querySelectorAll('.sidebar button').forEach(button => {
            const nomeLocal = button.getAttribute('data-local');
            const marker = marcadores[nomeLocal];

            if (marker) {
                button.addEventListener('mouseenter', () => {
                    const icon = marker._icon;
                    if (icon) icon.classList.add('marcador-hover');
                });

                button.addEventListener('mouseleave', () => {
                    const icon = marker._icon;
                    if (icon) icon.classList.remove('marcador-hover');
                });
            }
        });

        map.on('click', function(e) {
            alert("Você clicou no mapa em: " + e.latlng.toString());
        });
    </script>

    <script src="../script.js"></script>
